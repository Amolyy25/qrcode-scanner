<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Share</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 13px;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 18px 14px;
      height: 100vh;
      gap: 14px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #f0f0f0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #777;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      transition: background 0.4s;
      flex-shrink: 0;
    }
    .dot.connected { background: #30d158; box-shadow: 0 0 6px #30d15888; }
    .dot.error     { background: #ff453a; }

    /* ── QR ── */
    .qr-wrap {
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      width: 224px;
      height: 224px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #qr-img {
      width: 200px;
      height: 200px;
      display: block;
    }

    .qr-hint {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: -6px;
    }

    /* ── Drop zone ── */
    .drop-zone {
      width: 100%;
      flex: 1;
      min-height: 72px;
      border: 1.5px dashed #303030;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      color: #555;
      text-align: center;
      padding: 10px;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: #505050;
      background: #212121;
      color: #888;
    }

    .drop-zone .arrow {
      font-size: 24px;
      line-height: 1;
    }

    .drop-zone .label { font-size: 12px; }
    .drop-zone .sub   { font-size: 11px; color: #444; }

    /* ── Progress ── */
    .progress-wrap {
      width: 100%;
      display: none;
    }
    .progress-wrap.visible { display: block; }

    .progress-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: #0a84ff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.15s ease-out;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      width: 100%;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #666;
      padding: 4px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: #444; color: #aaa; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <span class="title">QR Share</span>
      <div class="status">
        <div class="dot" id="dot"></div>
        <span id="status-text">Waiting…</span>
      </div>
    </div>

    <div class="qr-wrap">
      <img id="qr-img" src="" alt="QR Code" />
    </div>

    <p class="qr-hint">Scan with iPhone to connect</p>

    <div class="drop-zone" id="drop-zone">
      <div class="arrow">↑</div>
      <div class="label">Drop files here</div>
      <div class="sub">or click to select</div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label" id="progress-label">…</div>
      <div class="track"><div class="fill" id="fill"></div></div>
    </div>

    <div class="footer">
      <button class="btn-reset" id="btn-reset">Reset</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
